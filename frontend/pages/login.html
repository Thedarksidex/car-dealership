<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Maruti Suzuki Showroom</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="../index.html" class="nav-logo"><span>Maruti Suzuki</span></a>
                <h2>Welcome Back</h2>
                <p>Sign in to your account</p>
            </div>
            <div id="alertBox"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-icon-right">
                        <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required>
                        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                    <span id="loginBtnText">Sign In</span>
                    <i class="fas fa-circle-notch fa-spin hidden" id="loginSpinner"></i>
                </button>
            </form>
            <p class="auth-footer">Don't have an account? <a href="register.html">Register here</a></p>
            <p class="auth-footer"><a href="../index.html">← Back to Home</a></p>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/auth-pages.js"></script>
</body>
</html>
