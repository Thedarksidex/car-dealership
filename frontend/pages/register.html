<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Maruti Suzuki Showroom</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="../index.html" class="nav-logo"><span>Maruti Suzuki</span></a>
                <h2>Create Account</h2>
                <p>Join us and explore our cars</p>
            </div>
            <div id="alertBox"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="regName" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" id="regPhone" class="form-control" placeholder="Enter 10-digit phone number" pattern="[0-9]{10}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-icon-right">
                        <input type="password" id="regPassword" class="form-control" placeholder="Min 6 characters" minlength="6" required>
                        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="regConfirmPassword" class="form-control" placeholder="Re-enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
                    <span id="registerBtnText">Create Account</span>
                    <i class="fas fa-circle-notch fa-spin hidden" id="registerSpinner"></i>
                </button>
            </form>
            <p class="auth-footer">Already have an account? <a href="login.html">Sign in here</a></p>
            <p class="auth-footer"><a href="../index.html">← Back to Home</a></p>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/auth-pages.js"></script>
</body>
</html>
