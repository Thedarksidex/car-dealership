<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile – Maruti Suzuki Showroom</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo"><span>Maruti Suzuki</span></a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li class="nav-user hidden" id="navUserMenu">
                    <div class="dropdown">
                        <button class="btn btn-outline dropdown-toggle" id="userDropdownBtn">
                            <i class="fas fa-user"></i> <span id="navUserName">Account</span>
                        </button>
                        <div class="dropdown-menu" id="userDropdown">
                            <a href="profile.html"><i class="fas fa-user-circle"></i> My Profile</a>
                            <a href="my-bookings.html"><i class="fas fa-calendar-check"></i> My Bookings</a>
                            <a href="my-enquiries.html"><i class="fas fa-envelope"></i> My Enquiries</a>
                            <a href="wishlist.html"><i class="fas fa-heart"></i> Wishlist</a>
                            <a href="admin.html" id="adminLink" class="hidden"><i class="fas fa-shield-alt"></i> Admin Panel</a>
                            <hr>
                            <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                        </div>
                    </div>
                </li>
            </ul>
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div class="page-header">
        <div class="container"><h1>My Profile</h1></div>
    </div>

    <section class="section">
        <div class="container" style="max-width: 600px;">
            <div class="form-card">
                <div id="alertBox"></div>
                <div class="profile-avatar">
                    <i class="fas fa-user-circle"></i>
                    <span id="profileName">Loading...</span>
                </div>
                <form id="profileForm">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="profileNameInput" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="profileEmail" class="form-control" disabled>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" id="profilePhone" class="form-control" pattern="[0-9]{10}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Account Role</label>
                        <input type="text" id="profileRole" class="form-control" disabled>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Update Profile</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container"><div class="footer-bottom"><p>&copy; 2026 Maruti Suzuki Showroom. All rights reserved.</p></div></div>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
